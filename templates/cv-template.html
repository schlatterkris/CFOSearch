<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — CV</title>
<style>
  @font-face {
    font-family: 'Space Grotesk';
    src: url('./fonts/space-grotesk-latin.woff2') format('woff2');
    font-weight: 100 900;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }

  @font-face {
    font-family: 'Space Grotesk';
    src: url('./fonts/space-grotesk-latin-ext.woff2') format('woff2');
    font-weight: 100 900;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-02AF, U+0304, U+0308, U+0329, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }

  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }

  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin-ext.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-02AF, U+0304, U+0308, U+0329, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    line-height: 1.5;
    color: #1a1a2e;
    background: #ffffff;
    padding: 0;
    margin: 0;
  }

  .page {
    width: 100%;
    max-width: {{PAGE_WIDTH}};
    margin: 0 auto;
    padding: 2px 0;
  }

  /* === HEADER === */
  .header {
    margin-bottom: 20px;
  }

  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
    line-height: 1.1;
  }

  .header-gradient {
    height: 2px;
    background: linear-gradient(to right, hsl(187, 74%, 32%), hsl(270, 70%, 45%));
    border-radius: 1px;
    margin-bottom: 10px;
  }

  .contact-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 10.5px;
    line-height: 1.4;
    color: #555;
  }

  .contact-row a {
    color: #555;
    text-decoration: none;
  }

  .contact-row .separator {
    color: #ccc;
  }

  /* === SECTIONS === */
  .section {
    margin-bottom: 18px;
  }

  .section-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: hsl(187, 74%, 32%);
    border-bottom: 1.5px solid #e2e2e2;
    padding-bottom: 4px;
    margin-bottom: 10px;
    line-height: 1.2;
  }

  /* === PROFESSIONAL SUMMARY === */
  .summary-text {
    font-size: 11px;
    line-height: 1.7;
    color: #2f2f2f;
  }

  a {
    white-space: nowrap;
  }

  /* === WORK EXPERIENCE === */
  .job {
    margin-bottom: 16px;
  }

  .job-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 2px;
  }

  .job-company {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12.5px;
    font-weight: 600;
    color: hsl(270, 70%, 45%);
  }

  .job-period {
    font-size: 10.5px;
    color: #777;
    white-space: nowrap;
  }

  .job-role {
    font-size: 11px;
    font-weight: 600;
    color: #333;
    margin-bottom: 4px;
  }

  .job-location {
    font-size: 10px;
    color: #888;
  }

  .job ul {
    padding-left: 18px;
    margin-top: 4px;
  }

  .job li {
    font-size: 10.5px;
    line-height: 1.6;
    color: #333;
    margin-bottom: 3px;
  }

  .job li strong {
    font-weight: 600;
  }

  /* === KEY INITIATIVE (embedded project) === */
  .key-initiative {
    margin: 6px 0 4px 18px;
    padding: 4px 0 4px 10px;
    border-left: 2px solid hsl(187, 40%, 70%);
  }

  .key-initiative-title {
    font-size: 10.5px;
    font-weight: 600;
    color: hsl(187, 74%, 28%);
    margin-bottom: 2px;
  }

  .key-initiative-desc {
    font-size: 10px;
    line-height: 1.5;
    color: #444;
  }

  /* === EDUCATION & CREDENTIALS (merged) === */
  .edu-cred-item {
    margin-bottom: 7px;
  }

  .edu-cred-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }

  .edu-cred-title {
    font-size: 11px;
    font-weight: 600;
    color: #333;
  }

  .edu-cred-org {
    color: hsl(270, 70%, 45%);
    font-weight: 500;
    font-size: 10.5px;
  }

  .edu-cred-year {
    font-size: 10px;
    color: #777;
    white-space: nowrap;
  }

  .edu-cred-desc {
    font-size: 10px;
    color: #666;
    margin-top: 1px;
    line-height: 1.5;
  }

  /* === EXPERTISE MATRIX === */
  .expertise-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 16px;
  }

  .expertise-item {
    font-size: 10.5px;
    color: #444;
    line-height: 1.5;
  }

  .expertise-domain {
    font-weight: 600;
    color: #333;
    font-size: 10.5px;
  }

  /* === PRINT === */
  @media print {
    body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .page {
      padding: 0;
    }
  }

  /* === PAGE BREAK CONTROL === */
  .avoid-break,
  .job,
  .edu-cred-item {
    break-inside: avoid;
    page-break-inside: avoid;
  }

  .key-initiative {
    break-inside: avoid;
    page-break-inside: avoid;
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header avoid-break">
    <h1>{{NAME}}</h1>
    <div class="header-gradient"></div>
    <div class="contact-row">
      <span>{{EMAIL}}</span>
      <span class="separator">|</span>
      <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a>
      <span class="separator">|</span>
      <a href="{{PORTFOLIO_URL}}">{{PORTFOLIO_DISPLAY}}</a>
      <span class="separator">|</span>
      <span>{{LOCATION}}</span>
    </div>
  </div>

  <!-- PROFESSIONAL SUMMARY -->
  <div class="section avoid-break">
    <div class="section-title">{{SECTION_SUMMARY}}</div>
    <div class="summary-text">{{SUMMARY_TEXT}}</div>
  </div>

  <!-- WORK EXPERIENCE -->
  <div class="section">
    <div class="section-title">{{SECTION_EXPERIENCE}}</div>
    {{EXPERIENCE}}
  </div>

  <!-- EDUCATION & CREDENTIALS (merged) -->
  <div class="section avoid-break">
    <div class="section-title">{{SECTION_EDUCATION_CREDENTIALS}}</div>
    {{EDUCATION_CREDENTIALS}}
  </div>

  <!-- EXPERTISE MATRIX -->
  <div class="section avoid-break">
    <div class="section-title">{{SECTION_SKILLS}}</div>
    <div class="expertise-grid">
      {{SKILLS}}
    </div>
  </div>

</div>
</body>
</html>
